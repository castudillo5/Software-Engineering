<!DOCTYPE html>
<html>
<head>
    <title>Academic Advisor</title>
</head>
<body>
    <h1>Server is working!</h1>
    <script>
        // Quick test — fetch student data from backend
        fetch('http://localhost:8080/student')
            .then(res => res.json())
            .then(data => {
                document.body.innerHTML += 
                    '<p>Student: ' + JSON.stringify(data) + '</p>';
            });
    </script>
</body>
</html>
