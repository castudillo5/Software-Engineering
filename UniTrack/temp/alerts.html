<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniTrack – Alerts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-page:#F4F3EF; --bg-surface:#FFFFFF; --bg-muted:#F0EFEB;
      --text-primary:#1A1916; --text-secondary:#6B6A65; --text-tertiary:#9E9C97;
      --border:rgba(26,25,22,0.10); --border-med:rgba(26,25,22,0.16);
      --accent:#2B5CE6; --radius-sm:6px; --radius-lg:14px; --sidebar-w:224px;
      --shadow-card:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
      --crit-bg:#FEF2F2;  --crit-border:#FECACA; --crit-icon-bg:#FEE2E2;
      --crit-icon:#DC2626; --crit-title:#991B1B;  --crit-badge:#DC2626;
      --warn-bg:#FFF7ED;  --warn-border:#FED7AA; --warn-icon-bg:#FFEDD5;
      --warn-icon:#EA580C; --warn-title:#9A3412;  --warn-badge:#EA580C;
      --info-bg:#EFF6FF;  --info-border:#BFDBFE; --info-icon-bg:#DBEAFE;
      --info-icon:#2563EB; --info-title:#1E40AF;  --info-badge:#2563EB;
    }
    html,body { height:100%; font-family:'DM Sans',sans-serif; background:var(--bg-page); color:var(--text-primary); font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased; }
    .layout { display:flex; height:100vh; overflow:hidden; }
    .sidebar { width:var(--sidebar-w); flex-shrink:0; background:var(--bg-surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; }
    .sidebar-brand { padding:22px 20px 18px; border-bottom:1px solid var(--border); }
    .brand-name { font-size:15px; font-weight:600; } .brand-sub { font-size:12px; color:var(--text-tertiary); margin-top:2px; }
    .nav { padding:10px 0; flex:1; }
    .nav-item { display:flex; align-items:center; gap:10px; padding:9px 20px; font-size:14px; color:var(--text-secondary); cursor:pointer; transition:background 0.12s,color 0.12s; user-select:none; }
    .nav-item:hover { background:var(--bg-muted); color:var(--text-primary); }
    .nav-item.active { background:var(--bg-muted); color:var(--text-primary); font-weight:500; }
    .nav-icon { width:16px; height:16px; flex-shrink:0; opacity:0.65; } .nav-item.active .nav-icon { opacity:1; }
    .nav-badge { margin-left:auto; background:#E5342A; color:#fff; font-size:11px; font-weight:600; border-radius:20px; padding:1px 7px; }
    .sidebar-user { padding:14px 20px; border-top:1px solid var(--border); display:flex; align-items:center; gap:10px; }
    .user-avatar { width:34px; height:34px; border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; flex-shrink:0; }
    .user-name { font-size:13px; font-weight:500; } .user-dept { font-size:11px; color:var(--text-tertiary); }
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .topbar { background:var(--bg-surface); border-bottom:1px solid var(--border); padding:22px 28px 18px; flex-shrink:0; }
    .page-title { font-size:22px; font-weight:600; letter-spacing:-0.4px; }
    .page-sub   { font-size:13px; color:var(--text-secondary); margin-top:3px; }
    .summary-row { display:flex; align-items:center; gap:20px; margin-top:16px; }
    .summary-pill { display:flex; align-items:center; gap:7px; font-size:13px; font-weight:500; color:var(--text-secondary); }
    .pill-dot { width:10px; height:10px; border-radius:50%; }
    .pill-dot.critical { background:#DC2626; } .pill-dot.warning { background:#EA580C; } .pill-dot.info { background:#2563EB; }
    .count-val { color:var(--text-primary); }
    .content { flex:1; overflow-y:auto; padding:24px 28px 40px; }
    .section-title { font-size:15px; font-weight:600; margin-bottom:14px; }
    .alert-card { border-radius:var(--radius-lg); border:1px solid; padding:20px 22px; margin-bottom:14px; display:flex; gap:16px; position:relative; transition:opacity 0.25s,transform 0.25s; }
    .alert-card.critical { background:var(--crit-bg); border-color:var(--crit-border); }
    .alert-card.warning  { background:var(--warn-bg); border-color:var(--warn-border); }
    .alert-card.info     { background:var(--info-bg); border-color:var(--info-border); }
    .alert-icon { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }
    .critical .alert-icon { background:var(--crit-icon-bg); color:var(--crit-icon); }
    .warning  .alert-icon { background:var(--warn-icon-bg); color:var(--warn-icon); }
    .info     .alert-icon { background:var(--info-icon-bg); color:var(--info-icon); }
    .alert-body { flex:1; min-width:0; }
    .alert-badge { position:absolute; top:18px; right:20px; font-size:11px; font-weight:700; padding:3px 11px; border-radius:20px; color:#fff; letter-spacing:0.4px; }
    .critical .alert-badge { background:var(--crit-badge); }
    .warning  .alert-badge { background:var(--warn-badge); }
    .info     .alert-badge { background:var(--info-badge); }
    .alert-title { font-size:15px; font-weight:600; margin-bottom:6px; padding-right:90px; line-height:1.3; }
    .critical .alert-title { color:var(--crit-title); }
    .warning  .alert-title { color:var(--warn-title); }
    .info     .alert-title { color:var(--info-title); }
    .alert-text { font-size:13px; color:var(--text-secondary); line-height:1.6; margin-bottom:14px; }
    .alert-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .alert-btn { height:32px; padding:0 16px; border-radius:var(--radius-sm); font-size:13px; font-weight:500; font-family:'DM Sans',sans-serif; cursor:pointer; border:1px solid var(--border-med); background:var(--bg-surface); color:var(--text-primary); transition:background 0.12s; }
    .alert-btn:hover { background:var(--bg-muted); }
    .alert-btn.dismiss-btn { background:transparent; border:1px solid var(--border-med); }
    .no-alerts-card { display:flex; align-items:center; gap:10px; padding:16px 20px; background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-lg); font-size:13px; color:var(--text-tertiary); margin-bottom:14px; }
    .dismissed-section { margin-top:32px; }
    .dismissed-label { font-size:12px; font-weight:600; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px; }
    .dismissed-card { background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:12px 18px; margin-bottom:8px; display:flex; align-items:center; gap:12px; opacity:0.6; }
    .dismissed-icon { width:28px; height:28px; border-radius:50%; background:var(--bg-muted); display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--text-tertiary); }
    .dismissed-name { font-size:13px; font-weight:500; color:var(--text-secondary); }
    .dismissed-tag { margin-left:auto; font-size:11px; font-weight:600; padding:2px 9px; border-radius:20px; background:var(--bg-muted); color:var(--text-tertiary); border:1px solid var(--border); }
    .loading-msg { padding:28px; text-align:center; color:var(--text-tertiary); font-size:13px; }
    .help-btn { position:fixed; bottom:24px; right:24px; width:36px; height:36px; border-radius:50%; background:var(--bg-surface); border:1px solid var(--border-med); box-shadow:0 2px 8px rgba(0,0,0,0.10); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-secondary); font-size:15px; font-weight:600; }
    .help-btn:hover { background:var(--accent); color:#fff; }
    ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:3px}
  </style>
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-name">UniTrack</div>
      <div class="brand-sub">Degree Progress System</div>
    </div>
    <div class="nav">
      <div class="nav-item">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1.5" y="1.5" width="13" height="13" rx="2"/><path d="M5 8h6M5 11h4"/></svg>Home
      </div>
      <div class="nav-item">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2.5" width="12" height="11" rx="1.5"/><path d="M5 1.5v2M11 1.5v2M2 6.5h12"/></svg>Schedule
      </div>
      <div class="nav-item">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4.5h12M2 8h8M2 11.5h5"/></svg>Registration
      </div>
      <div class="nav-item">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2.5a4.5 4.5 0 100 9 4.5 4.5 0 000-9z"/><path d="M8 12v2"/><path d="M6 13.5h4"/></svg>Alerts
        <span class="nav-badge" id="alert-badge" style="display:none">0</span>
      </div>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="user-avatar">—</div>
      <div>
        <div class="user-name" id="user-name">Loading…</div>
        <div class="user-dept" id="user-dept"></div>
      </div>
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <div class="page-title">Alerts &amp; Notifications</div>
      <div class="page-sub">Important updates and action items for your academic progress</div>
      <div class="summary-row">
        <div class="summary-pill">
          <span class="pill-dot critical"></span>
          <span class="count-val" id="count-critical">0</span> Critical
        </div>
        <div class="summary-pill">
          <span class="pill-dot warning"></span>
          <span class="count-val" id="count-warning">0</span> Warning
        </div>
        <div class="summary-pill">
          <span class="pill-dot info"></span>
          <span class="count-val" id="count-info">0</span> Info
        </div>
      </div>
    </div>

    <div class="content">
      <div class="section-title">Active Alerts</div>
      <div id="alerts-container">
        <div class="loading-msg">Loading alerts…</div>
      </div>
      <div class="dismissed-section" id="dismissed-section" style="display:none">
        <div class="dismissed-label">Dismissed</div>
        <div id="dismissed-list"></div>
      </div>
    </div>
  </div>
</div>

<div class="help-btn" title="Help">?</div>

<script src="api.js"></script>
<script src="nav.js"></script>
<script>
  const ICONS = {
    critical: `<svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v5M8 10.5v1"/><path d="M1.5 13L8 2l6.5 11H1.5z"/></svg>`,
    warning:  `<svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="8" r="6"/><path d="M8 5v3M8 10.5v.5"/></svg>`,
    info:     `<svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="8" r="6"/><path d="M8 7v5M8 5v.5"/></svg>`,
  };

  let counts = { critical:0, warning:0, info:0 };

  // Maps the raw AlertType string from the backend to a UI severity bucket.
  // GPA_WARNING, PREREQ_NOT_MET, MANDATORY_NOT_MET → critical
  // HOURS_NOT_MET, COURSE_REUSED                   → warning
  // ELIGIBLE_COURSE                                → info
  function getType(alert) {
    const t = (alert.type || '').toUpperCase();
    if (t === 'GPA_WARNING' || t === 'PREREQ_NOT_MET' || t === 'MANDATORY_NOT_MET')
      return 'critical';
    if (t === 'HOURS_NOT_MET' || t === 'COURSE_REUSED')
      return 'warning';
    return 'info';
  }

  function updateSummaryCounts() {
    document.getElementById('count-critical').textContent = counts.critical;
    document.getElementById('count-warning').textContent  = counts.warning;
    document.getElementById('count-info').textContent     = counts.info;
    const total = counts.critical + counts.warning + counts.info;
    const badge = document.getElementById('alert-badge');
    badge.textContent   = total;
    badge.style.display = total > 0 ? '' : 'none';
  }

  // Removes the alert visually AND tells the backend to remember the
  // dismissal so it doesn't reappear on the next page load. The full
  // alert object is needed because the backend identifies alerts by
  // their fingerprint (type + courseCode + message).
  async function dismissAlert(cardEl, severityBucket, title, alertObj) {
    // Tell the backend first so a failure doesn't fake a successful UI.
    const result = await API.dismissAlert(
      alertObj.type       || '',
      alertObj.courseCode || '',
      alertObj.message    || ''
    );
    if (!result || result._error) {
      alert('Failed to dismiss alert. Please try again.');
      return;
    }

    counts[severityBucket] = Math.max(0, counts[severityBucket] - 1);
    updateSummaryCounts();
    cardEl.style.opacity   = '0';
    cardEl.style.transform = 'translateX(8px)';
    setTimeout(() => {
      cardEl.remove();
      addDismissedEntry(title, severityBucket);
      const remaining = document.querySelectorAll('.alert-card').length;
      if (remaining === 0) {
        const container = document.getElementById('alerts-container');
        if (!container.querySelector('.no-alerts-card'))
          container.appendChild(makeNoAlertsEl());
      }
    }, 260);
  }

  function addDismissedEntry(title, type) {
    document.getElementById('dismissed-section').style.display = '';
    const card = document.createElement('div');
    card.className = 'dismissed-card';
    card.innerHTML = `
      <div class="dismissed-icon">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8l3.5 3.5L13 5"/></svg>
      </div>
      <div><div class="dismissed-name">${title}</div></div>
      <span class="dismissed-tag">${type.toUpperCase()}</span>`;
    document.getElementById('dismissed-list').appendChild(card);
  }

  function makeNoAlertsEl() {
    const el = document.createElement('div');
    el.className = 'no-alerts-card';
    el.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M5 8l2 2 4-4"/></svg> No active alerts — everything looks good!`;
    return el;
  }

  function buildAlertCard(alert) {
    const type = getType(alert);

    // Use the backend-provided title field.
    // Fall back to message if title is absent (defensive guard).
    const title       = alert.title   || alert.message || 'Alert';
    // Use message as the description body shown below the title.
    const description = alert.message || '';

    counts[type]++;

    const card = document.createElement('div');
    card.className = `alert-card ${type}`;
    card.innerHTML = `
      <div class="alert-icon">${ICONS[type]}</div>
      <div class="alert-body">
        <div class="alert-title">${title}</div>
        ${description ? `<div class="alert-text">${description}</div>` : ''}
        <div class="alert-actions">
          <button class="alert-btn dismiss-btn">Dismiss</button>
        </div>
      </div>
      <span class="alert-badge">${type.toUpperCase()}</span>`;

    card.querySelector('.dismiss-btn').addEventListener('click', () => {
      dismissAlert(card, type, title, alert);
    });

    return card;
  }

  async function loadAlerts() {
    const student = await API.getStudent();
    if (student) {
      const name = student.name || '—';
      const initials = name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
      document.getElementById('user-name').textContent   = name;
      document.getElementById('user-dept').textContent   = student.major || '';
      document.getElementById('user-avatar').textContent = initials;
    }

    const alerts    = await API.getAlerts();
    const container = document.getElementById('alerts-container');
    container.innerHTML = '';
    counts = { critical:0, warning:0, info:0 };

    if (!alerts || alerts.length === 0) {
      container.appendChild(makeNoAlertsEl());
      updateSummaryCounts();
      return;
    }

    // Sort: critical first, then warning, then info
    const order  = { critical:0, warning:1, info:2 };
    const sorted = [...alerts].sort((a,b) => order[getType(a)] - order[getType(b)]);

    const hasCritical = sorted.some(a => getType(a) === 'critical');
    if (!hasCritical) {
      const noCrit = document.createElement('div');
      noCrit.className = 'no-alerts-card';
      noCrit.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M5 8l2 2 4-4"/></svg> No critical alerts — you're in good standing.`;
      container.appendChild(noCrit);
    }

    sorted.forEach(alert => container.appendChild(buildAlertCard(alert)));
    updateSummaryCounts();
  }

  loadAlerts();
</script>
</body>
</html>
